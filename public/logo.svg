<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="calTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD84A"/>
      <stop offset="100%" style="stop-color:#F5A800"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#EEF2F8"/>
    </linearGradient>
    <linearGradient id="walletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E4270"/>
      <stop offset="100%" style="stop-color:#162035"/>
    </linearGradient>
    <linearGradient id="billGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5EC97A"/>
      <stop offset="100%" style="stop-color:#2A7A48"/>
    </linearGradient>
    <linearGradient id="coinFaceGrad" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" style="stop-color:#FFE96A"/>
      <stop offset="100%" style="stop-color:#E89A00"/>
    </linearGradient>
    <linearGradient id="coinEdgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C47F00"/>
      <stop offset="100%" style="stop-color:#8A5500"/>
    </linearGradient>

    <filter id="shadow1" x="-15%" y="-15%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#00000045"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="6" dy="16" stdDeviation="18" flood-color="#00000060"/>
    </filter>
    <filter id="shadow3" x="-25%" y="-25%" width="160%" height="170%">
      <feDropShadow dx="-6" dy="12" stdDeviation="16" flood-color="#00000055"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════ -->
  <!--           CALENDARIO           -->
  <!-- ═══════════════════════════════ -->
  <g filter="url(#shadow1)">
    <!-- Cuerpo blanco del calendario -->
    <rect x="160" y="130" width="640" height="500" rx="56" fill="url(#paperGrad)"/>
    <!-- Encabezado amarillo -->
    <rect x="160" y="130" width="640" height="155" rx="56" fill="url(#calTopGrad)"/>
    <rect x="160" y="220" width="640" height="68" fill="url(#calTopGrad)"/>

    <!-- Argollas -->
    <rect x="334" y="86" width="40" height="96" rx="20" fill="#1A2A42"/>
    <rect x="614" y="86" width="40" height="96" rx="20" fill="#1A2A42"/>

    <!-- Grilla de días -->
    <!-- Fila 1: 2 grises + 5 amarillos -->
    <rect x="210" y="318" width="70" height="56" rx="14" fill="#D0DAF0" opacity="0.55"/>
    <rect x="296" y="318" width="70" height="56" rx="14" fill="#D0DAF0" opacity="0.55"/>
    <rect x="382" y="318" width="70" height="56" rx="14" fill="#FFD04A" opacity="0.9"/>
    <rect x="468" y="318" width="70" height="56" rx="14" fill="#FFD04A" opacity="0.9"/>
    <rect x="554" y="318" width="70" height="56" rx="14" fill="#FFD04A" opacity="0.9"/>
    <rect x="640" y="318" width="70" height="56" rx="14" fill="#FFD04A" opacity="0.9"/>
    <!-- Fila 2: todos amarillos -->
    <rect x="210" y="388" width="70" height="56" rx="14" fill="#FFD04A" opacity="0.9"/>
    <rect x="296" y="388" width="70" height="56" rx="14" fill="#FFD04A" opacity="0.9"/>
    <rect x="382" y="388" width="70" height="56" rx="14" fill="#FFD04A" opacity="0.9"/>
    <rect x="468" y="388" width="70" height="56" rx="14" fill="#FFD04A" opacity="0.9"/>
    <rect x="554" y="388" width="70" height="56" rx="14" fill="#FFD04A" opacity="0.9"/>
    <rect x="640" y="388" width="70" height="56" rx="14" fill="#D0DAF0" opacity="0.55"/>
    <!-- Fila 3: todos grises -->
    <rect x="210" y="458" width="70" height="56" rx="14" fill="#D0DAF0" opacity="0.55"/>
    <rect x="296" y="458" width="70" height="56" rx="14" fill="#D0DAF0" opacity="0.55"/>
    <rect x="382" y="458" width="70" height="56" rx="14" fill="#D0DAF0" opacity="0.55"/>
    <rect x="468" y="458" width="70" height="56" rx="14" fill="#D0DAF0" opacity="0.55"/>
    <rect x="554" y="458" width="70" height="56" rx="14" fill="#D0DAF0" opacity="0.55"/>
    <rect x="640" y="458" width="70" height="56" rx="14" fill="#D0DAF0" opacity="0.55"/>
  </g>

  <!-- ═══════════════════════════════ -->
  <!--            BILLETERA           -->
  <!-- ═══════════════════════════════ -->
  <g filter="url(#shadow2)">
    <!-- Billetes verdes saliendo de la billetera (detrás) -->
    <rect x="330" y="555" width="310" height="72" rx="16" fill="url(#billGrad)"/>
    <!-- Líneas del billete -->
    <rect x="356" y="574" width="200" height="10" rx="5" fill="#FFFFFF25"/>
    <rect x="356" y="595" width="140" height="10" rx="5" fill="#FFFFFF20"/>

    <!-- Cuerpo de la billetera -->
    <rect x="265" y="598" width="480" height="260" rx="42" fill="url(#walletGrad)"/>

    <!-- Bolsillo interior (efecto de profundidad) -->
    <rect x="290" y="622" width="430" height="210" rx="30" fill="#1A2840"/>

    <!-- Tarjetero lateral derecho -->
    <rect x="560" y="622" width="140" height="210" rx="24" fill="#243558"/>
    <!-- Punto del cierre -->
    <circle cx="628" cy="727" r="22" fill="url(#calTopGrad)"/>
    <circle cx="628" cy="727" r="12" fill="#C47F00" opacity="0.5"/>
  </g>

  <!-- ═══════════════════════════════ -->
  <!--              MONEDA            -->
  <!-- ═══════════════════════════════ -->
  <g filter="url(#shadow3)">
    <!-- Borde / canto de la moneda (efecto 3D) -->
    <ellipse cx="296" cy="660" rx="118" ry="24" fill="url(#coinEdgeGrad)"/>
    <!-- Cara principal de la moneda -->
    <circle cx="296" cy="630" r="118" fill="url(#coinFaceGrad)"/>
    <!-- Anillo interior decorativo -->
    <circle cx="296" cy="630" r="96" fill="none" stroke="#C47F00" stroke-width="7" opacity="0.5"/>
    <!-- Símbolo $ -->
    <text
      x="296" y="672"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="116"
      font-weight="bold"
      text-anchor="middle"
      fill="#1A2840"
    >$</text>
  </g>
</svg>
